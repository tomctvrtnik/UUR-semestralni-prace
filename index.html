<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>KIV/UUR Čtvrtník T.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <meta name="theme-color" content="#79B159" />

  <style>
    ::selection {
      background-color: #79B159;
      /* Moss Green */
      color: #FDFFF7;
      /* Porcelain */
    }

    ::-webkit-scrollbar {
      width: 6px;
      /* Velmi tenký a elegantní */
    }

    ::-webkit-scrollbar-track {
      background: transparent;
      /* Zmizí ta ošklivá šedá "kolejnice" */
    }

    ::-webkit-scrollbar-thumb {
      background-color: #79B159;

      border-radius: 10px;

    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: #567b3e;

    }

    html,
    body,
    #root {
      height: 100%;
      height: 100dvh;
      /* Použití dynamické výšky (reaguje na klávesnici) */
      margin: 0;
      overflow: hidden;
      /* Zabrání prohlížeči odrolovat šuplík mimo obrazovku */
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
