<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, interactive-widget=resizes-content" />

  <title>KIV/UUR Čtvrtník T.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <meta name="theme-color" content="#79B159" />

  <style>
    /* Barvy při označení textu */
    ::selection {
      background-color: #79B159;
      color: #FDFFF7;
    }

    /* Vlastní vzhled scrollbaru */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: #79B159;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: #567b3e;
    }

    /* Zajištění, aby aplikace vyplnila celou obrazovku a nerolovala */
    html,
    body,
    #root {
      width: 100%;
      height: 100%;
      height: 100dvh;
      margin: 0;
      padding: 0;

      /* Zamezení posouvání celé stránky (např. při vysunutí klávesnice) */
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
